# There are 4 nodes for online_shopping_sharding_order:
spring.shardingsphere.rules.sharding.tables.online_shopping_order.actual-data-nodes=m$->{1..2}.online_shopping_sharding_order_$->{1..2}
#m1.online_shopping_sharding_order_1
#m1.online_shopping_sharding_order_2
#m2.online_shopping_sharding_order_1
#m2.online_shopping_sharding_order_2

#Schema sharding key user_id
spring.shardingsphere.sharding.tables.online_shopping_order.database-strategy.inline.sharding-column=order_id
spring.shardingsphere.sharding.tables.online_shopping_order.database-strategy.inline.algorithm-expression=m$->{order_id % 2 +1}

# Table Sharding key order_id
spring.shardingsphere.sharding.tables.online_shopping_order.table-strategy.inline.sharding-column=order_id
spring.shardingsphere.sharding.tables.online_shopping_order.table-strategy.inline.algorithm-expression=online_shopping_sharding_order_$->{order_id % 2 +1}

# always use m0 for table online_shopping_commodity
spring.shardingsphere.rules.sharding.tables.online_shopping_commodity.actual-data-nodes=m0.online_shopping_commodity
spring.shardingsphere.sharding.tables.online_shopping_commodity.database-strategy.inline.sharding-column=creator_user_id
spring.shardingsphere.sharding.tables.online_shopping_commodity.database-strategy.inline.algorithm-expression=m0
# Key generator
spring.shardingsphere.sharding.tables.online_shopping_order.key-generator.column=order_id
spring.shardingsphere.sharding.tables.online_shopping_order.key-generator.type=SNOWFLAKE

spring.main.allow-bean-definition-overriding=true
